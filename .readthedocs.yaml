version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - graphviz
  commands:
    - pip install --upgrade pip setuptools
    - pip install -e .
    - pip install -r docs/requirements.txt
    - sphinx-build -b html -D language=en docs/source docs/build/html

sphinx:
  builder: html
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .

<!-- Pipelines Analysis Tab -->
<div id="tab-pipelines" class="tab-content" style="display:none">
    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-diagram-project"></i> Pipelines Analysis</div>
        </div>
        <div class="card-body">
            <div id="pipelines-summary" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
                <div>
                    <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem">Slowest Pipelines</h4>
                    <div id="pipelines-slowest" class="table-container"></div>
                </div>
                <div>
                    <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem">Most Errors</h4>
                    <div id="pipelines-errors" class="table-container"></div>
                </div>
            </div>
            <div style="margin-top:1.5rem">
                <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem">Recent Pipelines</h4>
                <div id="pipelines-recent" class="table-container"></div>
            </div>
        </div>
    </div>
</div>

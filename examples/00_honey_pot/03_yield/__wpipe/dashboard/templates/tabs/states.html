<!-- States Analysis Tab -->
<div id="tab-states" class="tab-content" style="display:none">
    <div class="tab-description">
        <i class="fas fa-info-circle"></i>
        <strong>States</strong> are reusable step functions. This view shows which states are most used, slowest, and have most errors across all pipeline executions.
    </div>
    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-cubes"></i> States Analysis</div>
        </div>
        <div class="card-body">
            <div id="states-summary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
                <div>
                    <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem">Most Used States</h4>
                    <div id="states-most-used" class="table-container"></div>
                </div>
                <div>
                    <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem">Slowest States</h4>
                    <div id="states-slowest" class="table-container"></div>
                </div>
            </div>
            <div style="margin-top:1.5rem">
                <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem">States with Most Errors</h4>
                <div id="states-errors" class="table-container"></div>
            </div>
        </div>
    </div>
</div>
